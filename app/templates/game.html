<html>
<head>
<style>
body {
  background:#222;
  color:#fff;
  text-align:center;
  margin:0;
}

#board-container {
  position: relative;
  width: 400px;
  height: 400px;
  margin: auto;
}

#board-container svg {
  width: 100%;
  height: 100%;
  pointer-events: none; /* 👈 ESSENCIAL */
}

.overlay {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:grid;
  grid-template-columns: repeat(8,1fr);
  grid-template-rows: repeat(8,1fr);
  z-index:10;
}

.square {
  cursor:pointer;
}

.selected {
  background: rgba(255,255,0,0.4);
}
</style>
</head>

<body>

<h2>Sala: {{room}}</h2>

<div id="board-container">
  <div id="board"></div>
  <div class="overlay" id="grid"></div>
</div>

<script>
const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
const ws = new WebSocket(`${protocol}://${location.host}/ws/{{room}}`);

const squares = [
'a8','b8','c8','d8','e8','f8','g8','h8',
'a7','b7','c7','d7','e7','f7','g7','h7',
'a6','b6','c6','d6','e6','f6','g6','h6',
'a5','b5','c5','d5','e5','f5','g5','h5',
'a4','b4','c4','d4','e4','f4','g4','h4',
'a3','b3','c3','d3','e3','f3','g3','h3',
'a2','b2','c2','d2','e2','f2','g2','h2',
'a1','b1','c1','d1','e1','f1','g1','h1'
];

const grid = document.getElementById("grid");

squares.forEach(sq=>{
  const div = document.createElement("div");
  div.className = "square";
  div.onclick = () => handleClick(sq);
  grid.appendChild(div);
});

let selected = null;

function handleClick(sq){
  if(!selected){
    selected = sq;
    highlight(sq);
  } else {
    ws.send(selected + sq);
    clearHighlight();
    selected = null;
  }
}

function highlight(sq){
  const idx = squares.indexOf(sq);
  grid.children[idx].classList.add("selected");
}

function clearHighlight(){
  [...grid.children].forEach(c=>c.classList.remove("selected"));
}

ws.onmessage = e => {
  const data = JSON.parse(e.data);
  document.getElementById("board").innerHTML = data.board;
};
</script>

</body>
</html>
